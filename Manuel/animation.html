<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        div{
            height: 100px;
            width: 150px;
            background: linear-gradient(blue,purple,blue);
            margin: auto;
            margin-top: 60px;
        }
        div:hover{
             animation: practice 2s infinite;                
        }

        @keyframes practice{
            0%{
                transform: translate(70px) rotate(20deg);
            }
            50%{
                transform: translate(-70px) rotate(-20deg);
            }
            100%{
                transform: translate(70px) rotate(20deg);
            }
        }
    </style>
</head>
<body>
    <div>

    </div>
</body>
</html>

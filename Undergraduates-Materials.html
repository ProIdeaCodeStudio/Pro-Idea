<script>
    document.addEventListener('DOMContentLoaded', function () {
      const form = document.getElementById('gate-form');
      const phoneInput = document.getElementById('phone');
      const emailInput = document.getElementById('email');
      const submitButton = document.getElementById('submit-btn');

      form.addEventListener('submit', function (event) {
        event.preventDefault();

        const phone = phoneInput.value;
        const email = emailInput.value;
        let errors = [];

        // Validate phone number
        const phonePattern = /^[0-9]{10}$/;
        if (!phonePattern.test(phone)) {
          errors.push('Please enter a valid phone number (10 digits).');
        }

        // Validate email
        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailPattern.test(email)) {
          errors.push('Please enter a valid email address.');
        }

        if (errors.length > 0) {
          alert(errors.join('\n')); // Display all errors
          return;
        }

        submitButton.disabled = true; // Disable submit button

        // Simulate a request timeout
        const timeoutPromise = new Promise((_, reject) => {
          setTimeout(() => {
            reject(new Error('Request timed out. Please try again later.'));
          }, 5000); // 5 seconds timeout
        });

        // Simulate a successful database operation
        const databasePromise = new Promise((resolve) => {
          setTimeout(() => {
            resolve('Success');
          }, 2000); // Simulating a database success after 2 seconds
        });

        Promise.race([timeoutPromise, databasePromise])
          .then((result) => {
            alert('Form submitted successfully!'); // Display success message
            console.log(result);
            // Additional tracking logic can be added here
          })
          .catch((error) => {
            alert(error.message); // Display error message
          })
          .finally(() => {
            submitButton.disabled = false; // Re-enable submit button
          });
      });
    });
</script>

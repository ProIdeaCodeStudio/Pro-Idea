<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
    <style>
        .box-one {
            background-color: aqua;
            height:80px;
            width: 200px;
            padding: 20px;
            padding-left: 20px;
            padding-right: 60px;
            padding-top: 10px;
            padding-bottom: 70px;
            /* padding: 30px 60px 40px; */
            border-bottom-width: 30px;
            border: 10px solid black;
            border-radius: 30px;
            margin: 20px 150px;
        }
        .box-two {
             height:80px;
            width: 200px;
            padding: 20px;
            padding-left: 20px;
            padding-right: 60px;
            padding-top: 10px;
            padding-bottom: 70px;
            /* padding: 30px 60px 40px; */
            border-bottom-width: 30px;
            border: 10px solid black;
            border-radius: 30px;
            margin: 20px;
        }
        body {
            padding: 0;
            margin: 0;
        }
    </style>
</head>

<body>
    <div class="box-one">
        First
    </div>
    <div class="box-two">
        Second
    </div>
</body>

</html>
